<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logobh.PNG?v=2">
    <style>
        :root {
            --bg-color: #050505;
            --glow-red: #1a0000;
            --brand-red: #ff0000;
            --font-main: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { background-color: #000; }

        body {
            background: url('brasas.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #ffffff;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        /* Preloader Estilo Menu */
        .contenedor-logo {
            position: fixed;
            inset: 0;
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: 
                radial-gradient(circle at 50% 120%, rgba(255, 90, 20, 0.16) 0%, rgba(255, 90, 20, 0) 46%),
                linear-gradient(180deg, #000000 0%, #070707 55%, #120404 100%);
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .preloader-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-glow-wrap {
            position: relative;
            width: 180px;
            height: 180px;
            display: grid;
            place-items: center;
        }

        .logo-glow-wrap::before {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.5) 0%, transparent 70%);
            animation: grill-glow 2s ease-in-out infinite;
        }

        .logo-animado {
            width: 150px;
            border-radius: 50%;
            border: 3px solid #ff4500;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.4);
            animation: logo-pulse-fire 1.8s ease-in-out infinite;
        }

        .preloader-bar {
            width: 250px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .preloader-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff0000, #ff8c00);
            transition: width 0.2s;
        }

        .preloader-caption {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }

        .contenedor-logo.ocultar {
            opacity: 0;
            visibility: hidden;
        }

        /* Animaciones */
        @keyframes grill-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @keyframes logo-pulse-fire {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 800px;
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            flex-direction: column;
            align-items: center;
        }

        .logo-wrapper {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            position: relative;
        }

        .main-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--brand-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            animation: pulse 2s infinite ease-in-out;
            background-color: transparent;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes burger-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        h1 {
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: -1px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .time-part {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-part span {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: #ffffff; /* Precios/Contadores en blanco */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5), 0.5px 0.5px 0px rgba(255, 255, 255, 0.2);
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 12px;
        }

        .time-part label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 1;
            margin-top: 5px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .cooking-text {
            font-size: 1rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 1;
            margin-top: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <!-- Añadida la animación inicial del logo -->
    <div class="contenedor-logo" id="preloader">
        <div class="preloader-inner">
            <div class="logo-glow-wrap">
                <img src="logobh.PNG" alt="Logo" class="logo-animado">
            </div>
            <div class="preloader-bar">
                <div id="preloader-progress" class="preloader-progress"></div>
            </div>
            <p class="preloader-caption">Encendiendo la parrilla</p>
        </div>
    </div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="logobh.PNG" alt="Burger House" class="main-logo">
        </div>

        <h1>¿Listos para lo que se viene?</h1>

        <div class="countdown" id="timer">
            <div class="time-part"><span id="days">00</span><label>D</label></div>
            <div class="time-part"><span id="hours">00</span><label>H</label></div>
            <div class="time-part"><span id="mins">00</span><label>M</label></div>
            <div class="time-part"><span id="secs">00</span><label>S</label></div>
        </div>

        <p class="cooking-text">¡Cocinándose!</p>
    </div>

    <script>
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minsEl = document.getElementById('mins');
        const secsEl = document.getElementById('secs');

        // Lógica del Preloader
        document.addEventListener('DOMContentLoaded', () => {
            const progress = document.getElementById('preloader-progress');
            const preloader = document.getElementById('preloader');
            let width = 0;
            const interval = setInterval(() => {
                width += Math.random() * 8;
                if (width >= 100) {
                    width = 100;
                    clearInterval(interval);
                    setTimeout(() => preloader.classList.add('ocultar'), 500);
                }
                progress.style.width = width + '%';
            }, 150);
        });

        const targetDate = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('timer').innerText = "SISTEMA ONLINE";
                return;
            }

            daysEl.innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            hoursEl.innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            minsEl.innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            secsEl.innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
