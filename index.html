<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logobh.PNG?v=2">
    <style>
        :root {
            --bg-color: #050505;
            --glow-red: #1a0000;
            --brand-red: #ff0000;
            --font-main: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, var(--glow-red) 0%, var(--bg-color) 100%);
            color: #ffffff;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .falling-burgers {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .burger-particle {
            position: absolute;
            width: 30px;
            height: 30px;
            background: url('hamburguesa.png') no-repeat center/contain;
            opacity: 0.3;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-wrapper {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            position: relative;
        }

        .main-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--brand-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes burger-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        h1 {
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: -1px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .time-part {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-part span {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--brand-red);

            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5), 0.5px 0.5px 0px rgba(255, 255, 255, 0.2);
        }

        .time-part label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        .cooking-text {
            font-size: 1rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="falling-burgers" id="burger-bg"></div>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logobh.PNG" alt="Burger House" class="main-logo">
        </div>

        <h1>¿Listos para lo que se viene?</h1>

        <div class="countdown" id="timer">
            <div class="time-part"><span id="days">00</span><label>D</label></div>
            <div class="time-part"><span id="hours">00</span><label>H</label></div>
            <div class="time-part"><span id="mins">00</span><label>M</label></div>
            <div class="time-part"><span id="secs">00</span><label>S</label></div>
        </div>

        <p class="cooking-text">¡Cocinándose!</p>
    </div>

    <script>
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minsEl = document.getElementById('mins');
        const secsEl = document.getElementById('secs');
        
        function createBurgers() {
            const bg = document.getElementById('burger-bg');
            for (let i = 0; i < 15; i++) {
                const burger = document.createElement('div');
                burger.className = 'burger-particle';
                burger.style.left = Math.random() * 100 + 'vw';
                burger.style.animationDuration = (Math.random() * 10 + 10) + 's';
                burger.style.animationDelay = (Math.random() * 5) + 's';
                bg.appendChild(burger);
            }
        }
        createBurgers();

        const targetDate = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('timer').innerText = "SISTEMA ONLINE";
                return;
            }

            daysEl.innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            hoursEl.innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            minsEl.innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            secsEl.innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
