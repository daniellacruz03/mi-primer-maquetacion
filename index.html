<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mantenimiento - Burguer House</title>
    <link rel="icon" href="logobh.webp" type="image/webp">
    
    <!-- Fuentes Montserrat 400 y 800 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e60000;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #080808;
        }

        .maintenance-wrapper {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('brasas.webp') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .icon-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            width: 100%;
        }

        .main-wrench-icon {
            width: clamp(100px, 20vw, 150px);
            fill: var(--primary-color);
            filter: drop-shadow(0 0 20px rgba(230, 0, 0, 0.6));
            animation: latido 3s ease-in-out infinite;
        }

        .text-content h1 {
            font-weight: 800;
            color: #ffffff;
            font-size: clamp(1.8rem, 6vw, 3.2rem);
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.8);
        }

        .text-content p {
            font-weight: 400;
            color: #dddddd;
            font-size: clamp(1rem, 3vw, 1.2rem);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            text-shadow: 1px 1px 8px rgba(0, 0, 0, 0.8);
        }

        @keyframes latido {
            0%, 100% { transform: scale(0.95); opacity: 0.9; }
            50% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .icon-row { 
                gap: 20px; 
            }
            .main-wrench-icon { width: 90px; }
        }
    </style>
</head>
<body>
    <div class="maintenance-wrapper">
        <div class="icon-row">
            <!-- Icono Llave SVG -->
            <svg class="main-wrench-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77Z"/></svg>
        </div>
        
        <div class="text-content">
            <h1>ESTAMOS MEJORANDO LA EXPERIENCIA</h1>
            <p>Estamos ajustando los motores en la cocina. Volveremos en unos minutos con las mejores hamburguesas de la ciudad.</p>
        </div>
    </div>
</body>
</html>
