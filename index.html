<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House | System Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logobh.PNG?v=2">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --neon-red: #e63946;
            --neon-cyan: #00FFFF;
            --terminal-font: 'Share Tech Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-cyan);
            font-family: var(--terminal-font);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: left;
        }

        /* --- Efecto Scanlines --- */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* --- Filtro Rojo Característico --- */
        .red-filter-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(230, 57, 70, 0.15) 100%);
            pointer-events: none;
            z-index: 101; /* Por encima de todo para teñir la imagen */
        }

        /* --- Matrix Rain Canvas --- */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 800px;
            padding: 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-glitch {
            width: 150px;
            filter: drop-shadow(0 0 10px var(--neon-red));
            animation: logo-flicker 2s infinite;
        }

        @keyframes logo-flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 100% { opacity: 1; transform: scale(1); filter: hue-rotate(0deg); }
            20%, 21.999% { opacity: 0.4; transform: scale(1.05) skewX(20deg); filter: hue-rotate(90deg); }
            63%, 63.999% { opacity: 0.8; transform: scale(0.9) skewX(-15deg); }
        }

        /* --- Tipografía y Glitch --- */
        .red-neon {
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            100% { clip: rect(62px, 9999px, 43px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 56px, 0); }
            100% { clip: rect(70px, 9999px, 32px, 0); }
        }

        .timer {
            font-size: 2rem;
            margin: 30px 0;
            color: var(--neon-cyan);
            letter-spacing: 5px;
            animation: blink 1s steps(2, start) infinite;
        }

        @keyframes blink { to { visibility: hidden; } }

        .signature {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.6;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="red-filter-overlay"></div>
    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <div class="logo-container">
            <img src="logobh.png" alt="Logo" class="logo-glitch">
        </div>

        <h1 class="glitch red-neon" data-text="> /SYSTEM/STATUS: INITIATING_UPDATE">
            > /SYSTEM/STATUS: INITIATING_UPDATE
        </h1>

        <p class="cyan-neon">> CODING_FLAVOR [##################] 100%</p>
        
        <br>
        
        <p class="glitch" data-text="> Estamos trabajando en la página para darte el mejor sabor. Muy pronto podrás hacer tus pedidos aquí.">
            > Estamos trabajando en la página para darte el mejor sabor. Muy pronto podrás hacer tus pedidos aquí.
        </p>

        <div class="timer" id="timer">[00:00:00:00]</div>

        <p class="signature">> [BURGUER HOUSE_v1.0] [MERIDA_VZLA]</p>
    </div>

    <script>
        // Matrix Rain con código de Burguer House
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const codeStrings = ["Cheese House", "Double Meat", "REF", "$9.99", "Pepsi 1L", "Tocineta", "Salsa de la Casa", "Pan de Papa", "10.30 PM"];
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00FFFF';
            ctx.font = fontSize + 'px "Share Tech Mono"';

            drops.forEach((y, i) => {
                const text = codeStrings[Math.floor(Math.random() * codeStrings.length)];
                ctx.fillText(text, i * fontSize * 6, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // Timer Técnico Infinito
        const timerEl = document.getElementById('timer');
        function updateTimer() {
            const h = Math.floor(Math.random() * 24).toString().padStart(2, '0');
            const m = Math.floor(Math.random() * 60).toString().padStart(2, '0');
            const s = Math.floor(Math.random() * 60).toString().padStart(2, '0');
            const ms = Math.floor(Math.random() * 99).toString().padStart(2, '0');
            timerEl.innerText = `[${h}:${m}:${s}:${ms}]`;
        }
        setInterval(updateTimer, 80);
    </script>
</body>
</html>
