<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Burguer House - Próximamente</title>
    <link rel="icon" href="logobh.webp" type="image/webp">
    
    <!-- Fuentes sincronizadas con el App ADN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #e60000;
            --bg-color: #080808;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Montserrat', sans-serif;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Capa 1: Spoiler sutil de la App con desenfoque inmersivo */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('pantallaprincipal.png') center/cover no-repeat;
            filter: blur(6px) brightness(0.7);
            z-index: -2;
        }

        /* Capa 2: Overlay de misterio y viñeta hacia negro absoluto */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.1) 0%, rgba(8, 8, 8, 0.4) 50%, rgba(0, 0, 0, 0.95) 100%);
            z-index: -1;
        }

        /* Contenedor compacto estilo App (Max 400px) */
        .app-shell {
            max-width: 400px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 40px 10px;
        }

        /* Tarjeta de Texto con Glassmorphism */
        .text-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 16px; /* Sincronizado con bloques del contador */
            padding: 20px 15px;
            width: 95%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Logo sutil (ADN Navigation) */
        .logo-header {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            filter: drop-shadow(0 0 10px rgba(230, 0, 0, 0.3));
            animation: latido 3s ease-in-out infinite;
        }

        @keyframes latido {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1); opacity: 1; }
        }

        .text-card h1 {
            font-family: var(--font-heading);
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 8px;
        }

        .subtitle {
            font-weight: 500;
            font-size: 0.9rem;
            line-height: 1.6;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Contador Minimalista y Compacto */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            margin: 10px 0;
        }

        .count-block {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px; /* ADN: Bordes limpios */
            padding: 10px 5px;
        }

        .count-number {
            display: block;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary-color);
            line-height: 1;
        }

        .count-label {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Botón de Acción Premium (ADN index.html) */
        .btn-action {
            width: 85%;
            background: linear-gradient(180deg, #8b0000 0%, #ff0000 100%);
            color: white;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px;
            border-radius: 30px; /* ADN: Redondeado App */
            font-family: var(--font-heading);
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease;
        }

        .btn-action:active {
            transform: scale(0.96);
        }

    </style>
</head>
<body>
    <div class="app-shell">
        <img src="logobh.webp" alt="BH Logo" class="logo-header">
        
        <div class="text-card">
            <h1>BURGUER HOUSE</h1>
            <p class="subtitle">¿Preparado para lo que se viene?</p>
        </div>

        <div class="countdown-container" id="timer">
            <div class="count-block"><span class="count-number" id="d">00</span><span class="count-label">Días</span></div>
            <div class="count-block"><span class="count-number" id="h">00</span><span class="count-label">Hrs</span></div>
            <div class="count-block"><span class="count-number" id="m">00</span><span class="count-label">Min</span></div>
            <div class="count-block"><span class="count-number" id="s">00</span><span class="count-label">Seg</span></div>
        </div>

        <button class="btn-action" onclick="alert('¡Excelente! Te avisaremos apenas encendamos la parrilla.')">
            Activar Notificacion
        </button>
    </div>

    <script>
        const launch = new Date("June 15, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = launch - now;
            if (diff < 0) {
                document.getElementById("timer").innerHTML = "<p style='grid-column: span 4; font-family: Oswald;'>¡YA ESTAMOS ABIERTOS!</p>";
                return;
            }
            document.getElementById("d").innerText = Math.floor(diff / (864e5)).toString().padStart(2, '0');
            document.getElementById("h").innerText = Math.floor((diff % 864e5) / 36e5).toString().padStart(2, '0');
            document.getElementById("m").innerText = Math.floor((diff % 36e5) / 6e4).toString().padStart(2, '0');
            document.getElementById("s").innerText = Math.floor((diff % 6e4) / 1e3).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
